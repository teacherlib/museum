<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการพิพิธภัณฑ์ รร.ตท.สปท.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f0ff; }
        .bg-lavender { background-color: #e9d5ff; }
        .btn-purple { background-color: #9333ea; transition: 0.3s; }
        .btn-purple:hover { background-color: #7e22ce; }
        #loginOverlay { backdrop-filter: blur(8px); }
        
        #toast {
            visibility: hidden;
            min-width: 300px;
            margin-left: -150px;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4">

    <div id="toast"></div>

    <div id="loginOverlay" class="fixed inset-0 bg-purple-900/80 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-purple-600 text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">เข้าสู่ระบบพิพิธภัณฑ์</h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Username" class="w-full border border-purple-200 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-purple-500">
                <input type="password" id="passInput" placeholder="Password" class="w-full border border-purple-200 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-purple-500">
                <button onclick="checkLogin()" class="w-full btn-purple text-white py-3 rounded-lg font-bold shadow-lg">ยืนยันตัวตน</button>
                <p id="loginError" class="text-red-500 text-xs hidden">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!</p>
            </div>
        </div>
    </div>

    <div id="mainContent" class="max-w-5xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-purple-200 opacity-0 transition-opacity duration-500">
        <div class="bg-purple-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">บันทึกการเยี่ยมชมพิพิธภัณฑ์</h1>
                <p class="text-sm opacity-80">โรงเรียนเตรียมทหาร สถาบันวิชาการป้องกันประเทศ</p>
            </div>
            <button onclick="logout()" class="bg-purple-800 hover:bg-purple-900 px-4 py-1.5 rounded-full text-xs border border-purple-400 font-bold">ออกจากระบบ</button>
        </div>

        <div class="p-6 border-b border-purple-100">
            <form id="museumForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="text-purple-800 font-bold text-sm">ชื่อคณะเยี่ยมชม <span class="text-red-500">*</span></label>
                    <input type="text" id="groupName" class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-400 outline-none">
                </div>
                <div>
                    <label class="text-purple-800 font-bold text-sm">จำนวนผู้เยี่ยมชม <span class="text-red-500">*</span></label>
                    <input type="number" id="visitorCount" class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-400 outline-none">
                </div>
                <div>
                    <label class="text-purple-800 font-bold text-sm">วันที่และเวลา <span class="text-red-500">*</span></label>
                    <input type="datetime-local" id="visitDateTime" class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-400 outline-none">
                </div>
                <div class="md:col-span-3">
                    <label class="text-purple-800 font-bold text-sm">ชุดการต้อนรับคณะ</label>
                    <select id="packageType" class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-400 outline-none">
                        <option>ชุดที่ 1: พ.ท.หญิง อภิวรรณฯ (หน.ชุด)</option>
                        <option>ชุดที่ 2: พ.ท.หญิง รุ่งนภาฯ (หน.ชุด)</option>
                        <option>ชุดที่ 3: ร.ท.ธนากรฯ (หน.ชุด)</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit" id="submitBtn" class="w-full btn-purple text-white p-2.5 rounded-lg font-bold shadow-md">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>

        <div class="bg-lavender p-4 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-purple-100">
            <div class="flex flex-wrap items-center gap-2">
                <span class="text-purple-900 font-bold">ช่วงเวลา:</span>
                <input type="date" id="startDate" class="rounded border-purple-300 p-1 text-sm outline-none">
                <span class="text-purple-400">ถึง</span>
                <input type="date" id="endDate" class="rounded border-purple-300 p-1 text-sm outline-none">
                <button onclick="filterData()" class="bg-purple-600 text-white px-3 py-1 rounded text-sm hover:bg-purple-700">กรองข้อมูล</button>
                <button onclick="fetchData()" class="text-purple-600 px-3 py-1 text-sm hover:underline">แสดงทั้งหมด</button>
            </div>
            <button onclick="exportPDF()" class="bg-red-500 text-white px-4 py-2 rounded-lg shadow font-bold hover:bg-red-600 flex items-center gap-2">
                พิมพ์ PDF (ภาษาไทย)
            </button>
        </div>

        <div class="p-4 overflow-x-auto min-h-[300px]">
            <table class="w-full text-left" id="reportTable">
                <thead class="bg-purple-50 text-purple-800 border-b-2 border-purple-200">
                    <tr>
                        <th class="p-3">วันที่/เวลา (พ.ศ.)</th>
                        <th class="p-3">คณะเยี่ยมชม</th>
                        <th class="p-3 text-center">จำนวน (คน)</th>
                        <th class="p-3">ชุดการต้อนรับ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-purple-50 text-sm">
                    <tr><td colspan="4" class="text-center py-10 text-gray-400 italic">กรุณารอข้อมูลสักครู่...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfOkJt3nCDpBR128Icd1ZI7vvAgnaKJfY24Nj-FhcM1jv3pP2d1zm9nUFtWB2xT_qq/exec';
        const AUTH_USER = 'library';
        const AUTH_PASS = 'library5413';
        let allData = [];

        // ฟังก์ชันแปลงวันที่เป็น พ.ศ. ให้ตรงตามฐานข้อมูล
        function formatThaiDate(dateStr) {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;

            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear() + 543;
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');

            return `${day}/${month}/${year} ${hours}:${minutes}`;
        }

        // --- ระบบ Login ---
        function checkLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if (u === AUTH_USER && p === AUTH_PASS) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('opacity-0');
                sessionStorage.setItem('isLoggedIn', 'true');
                fetchData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() { sessionStorage.removeItem('isLoggedIn'); location.reload(); }

        window.onload = () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('opacity-0');
                fetchData();
            }
        }

        // --- จัดการข้อมูล ---
        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                allData = data.slice(1);
                renderTable(allData);
            } catch (error) { showToast("โหลดข้อมูลล้มเหลว", "error"); }
        }

        function renderTable(dataList) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            if(dataList.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-gray-400">ไม่พบข้อมูล</td></tr>';
                return;
            }

            dataList.sort((a, b) => new Date(b[3]) - new Date(a[3])).forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-purple-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-3">${formatThaiDate(row[3])}</td>
                    <td class="p-3 font-bold text-purple-700">${row[1]}</td>
                    <td class="p-3 text-center">${row[2]}</td>
                    <td class="p-3 text-gray-600">${row[4]}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // --- แก้ไขระบบกรองวันที่ให้ใช้งานได้จริง ---
        function filterData() {
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;

            if (!startVal || !endVal) {
                showToast("กรุณาระบุวันที่เริ่มและสิ้นสุด", "error");
                return;
            }

            const startDate = new Date(startVal).setHours(0, 0, 0, 0);
            const endDate = new Date(endVal).setHours(23, 59, 59, 999);

            const filtered = allData.filter(row => {
                const rowDate = new Date(row[3]).getTime();
                return rowDate >= startDate && rowDate <= endDate;
            });

            renderTable(filtered);
            showToast(`พบข้อมูล ${filtered.length} รายการ`);
        }

        // --- ระบบพิมพ์ PDF ภาษาไทย ---
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // ใช้ฟอนต์ Sarabun จากหน้าเว็บ และกำหนดค่า Unicode
            doc.addFont("https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/THSarabunNew/THSarabunNew.ttf", "ThaiFont", "normal");
            doc.setFont("ThaiFont");

            doc.text("รายงานการเยี่ยมชมพิพิธภัณฑ์ รร.ตท.สปท.", 14, 15);

            const tableRows = [];
            const rows = document.querySelectorAll("#tableBody tr");
            
            rows.forEach(row => {
                const rowData = [];
                row.querySelectorAll("td").forEach(cell => rowData.push(cell.innerText));
                tableRows.push(rowData);
            });

            doc.autoTable({
                head: [['วันที่/เวลา (พ.ศ.)', 'คณะเยี่ยมชม', 'จำนวน (คน)', 'ชุดการต้อนรับ']],
                body: tableRows,
                startY: 25,
                styles: { font: 'ThaiFont', fontSize: 10 },
                headStyles: { fillColor: [107, 33, 168] }
            });

            doc.save('Museum_Report.pdf');
        }

        // บันทึกฟอร์ม
        document.getElementById('museumForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                groupName: document.getElementById('groupName').value,
                visitorCount: document.getElementById('visitorCount').value,
                visitDateTime: document.getElementById('visitDateTime').value,
                packageType: document.getElementById('packageType').value
            };

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'กำลังบันทึก...';

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                showToast("บันทึกสำเร็จ");
                document.getElementById('museumForm').reset();
                fetchData();
            } catch (e) { showToast("เกิดข้อผิดพลาด", "error"); }
            finally { btn.disabled = false; btn.innerText = 'บันทึกข้อมูล'; }
        });

        function showToast(msg, type = 'success') {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.style.backgroundColor = type === 'success' ? '#10B981' : '#EF4444';
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        }
    </script>
</body>
</html>
