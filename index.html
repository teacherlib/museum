<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการพิพิธภัณฑ์ รร.ตท.สปท.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f0ff; }
        .bg-lavender { background-color: #e9d5ff; }
        .btn-purple { background-color: #9333ea; transition: 0.3s; }
        .btn-purple:hover { background-color: #7e22ce; }
        #loginOverlay { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="p-4">

    <div id="loginOverlay" class="fixed inset-0 bg-purple-900/80 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-purple-600">
            <div class="text-center mb-6">
                <div class="bg-purple-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">เข้าสู่ระบบ</h2>
                <p class="text-gray-500 text-sm">สำหรับเจ้าหน้าที่ห้องสมุด กสป.รร.ตท.สปท.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Username</label>
                    <input type="text" id="userInput" class="w-full border border-purple-200 rounded-lg p-2.5 mt-1 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Password</label>
                    <input type="password" id="passInput" class="w-full border border-purple-200 rounded-lg p-2.5 mt-1 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <button onclick="checkLogin()" class="w-full btn-purple text-white py-3 rounded-lg font-bold shadow-lg mt-2">
                    ยืนยันตัวตน
                </button>
                <p id="loginError" class="text-red-500 text-xs text-center hidden">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!</p>
            </div>
        </div>
    </div>

    <div id="mainContent" class="max-w-5xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-purple-200 opacity-0 transition-opacity duration-500">
        <div class="bg-purple-700 p-6 text-white flex justify-between items-center">
            <div class="text-left">
                <h1 class="text-2xl font-bold">บันทึกการเยี่ยมชมพิพิธภัณฑ์</h1>
                <p class="text-sm opacity-80">โรงเรียนเตรียมทหาร สถาบันวิชาการป้องกันประเทศ</p>
            </div>
            <button onclick="logout()" class="bg-purple-800 hover:bg-purple-900 px-3 py-1 rounded text-xs border border-purple-400">ออกจากระบบ</button>
        </div>

        <div class="p-6 border-b border-purple-100">
            <form id="museumForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="text-purple-800 font-bold text-sm italic">ชื่อคณะเยี่ยมชม</label>
                    <input type="text" id="groupName" required class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="text-purple-800 font-bold text-sm italic">จำนวน (คน)</label>
                    <input type="number" id="visitorCount" required class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="text-purple-800 font-bold text-sm italic">วันที่/เวลา</label>
                    <input type="datetime-local" id="visitDateTime" required class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div class="md:col-span-3">
                    <label class="text-purple-800 font-bold text-sm italic">ชุดการต้อนรับคณะ</label>
                    <select id="packageType" class="w-full border border-purple-200 rounded p-2 focus:ring-2 focus:ring-purple-500 outline-none">
                        <option>ชุดที่ 1: พ.ท.หญิง อภิวรรณฯ (หน.ชุด)</option>
                        <option>ชุดที่ 2: พ.ท.หญิง รุ่งนภาฯ (หน.ชุด)</option>
                        <option>ชุดที่ 3: ร.ท.ธนากรฯ (หน.ชุด)</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit" id="submitBtn" class="w-full btn-purple text-white p-2 rounded-lg font-bold shadow-md">
                        บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-lavender p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-wrap items-center gap-2">
                <span class="text-purple-900 font-bold">เลือกช่วงเวลา:</span>
                <input type="date" id="startDate" class="rounded border-purple-300 p-1 text-sm outline-none">
                <span class="text-purple-400">ถึง</span>
                <input type="date" id="endDate" class="rounded border-purple-300 p-1 text-sm outline-none">
                <button onclick="filterData()" class="bg-purple-600 text-white px-3 py-1 rounded text-sm font-bold hover:bg-purple-700">กรอง</button>
                <button onclick="resetFilter()" class="bg-gray-400 text-white px-3 py-1 rounded text-sm hover:bg-gray-500">ทั้งหมด</button>
            </div>
            <button onclick="exportPDF()" class="bg-red-500 text-white px-4 py-2 rounded-lg shadow font-bold hover:bg-red-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2z"/></svg>
                พิมพ์รายงาน PDF
            </button>
        </div>

        <div class="p-4 overflow-x-auto">
            <table class="w-full text-left" id="reportTable">
                <thead>
                    <tr class="bg-purple-50 text-purple-800 border-b-2 border-purple-200">
                        <th class="p-3">วันที่/เวลา</th>
                        <th class="p-3">คณะเยี่ยมชม</th>
                        <th class="p-3 text-center">จำนวน</th>
                        <th class="p-3">ชุดการต้อนรับ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-purple-50 text-sm">
                    <tr><td colspan="4" class="text-center p-8 text-gray-400">กรุณากดกรองข้อมูลหรือรอโหลด...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfOkJt3nCDpBR128Icd1ZI7vvAgnaKJfY24Nj-FhcM1jv3pP2d1zm9nUFtWB2xT_qq/exec';
        const AUTH_USER = 'library';
        const AUTH_PASS = 'library5413';
        let allData = [];

        // ระบบ Login
        function checkLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const error = document.getElementById('loginError');

            if (u === AUTH_USER && p === AUTH_PASS) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('opacity-0');
                sessionStorage.setItem('isLoggedIn', 'true');
                fetchData();
            } else {
                error.classList.remove('hidden');
            }
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            location.reload();
        }

        // ตรวจสอบสถานะ Login เมื่อเปิดหน้า
        window.onload = () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('opacity-0');
                fetchData();
            }
        }

        // --- ส่วนจัดการข้อมูล (คงเดิมจากเวอร์ชันที่แล้ว) ---
        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                allData = data.slice(1); 
                renderTable(allData);
            } catch (error) { console.error("Error loading data"); }
        }

        function renderTable(dataList) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            dataList.sort((a, b) => new Date(b[3]) - new Date(a[3])).forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-purple-50";
                tr.innerHTML = `<td class="p-3">${row[3].replace('T', ' ')}</td><td class="p-3 font-bold text-purple-700">${row[1]}</td><td class="p-3 text-center">${row[2]}</td><td class="p-3">${row[4]}</td>`;
                tableBody.appendChild(tr);
            });
        }

        function filterData() {
            const s = document.getElementById('startDate').value;
            const e = document.getElementById('endDate').value;
            if(!s || !e) return alert("เลือกช่วงวันที่ให้ครบ");
            const filtered = allData.filter(r => {
                const d = new Date(r[3]).toISOString().split('T')[0];
                return d >= s && d <= e;
            });
            renderTable(filtered);
        }

        function resetFilter() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            renderTable(allData);
        }

        document.getElementById('museumForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'บันทึกแล้ว...';
            
            const payload = {
                groupName: document.getElementById('groupName').value,
                visitorCount: document.getElementById('visitorCount').value,
                visitDateTime: document.getElementById('visitDateTime').value,
                packageType: document.getElementById('packageType').value
            };

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            btn.disabled = false;
            btn.innerText = 'บันทึกข้อมูล';
            document.getElementById('museumForm').reset();
            fetchData();
        });

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Visitor Report - AFAPS Museum", 14, 15);
            doc.autoTable({ html: '#reportTable', startY: 20, theme: 'grid', headStyles: {fillColor: [107, 33, 168]} });
            doc.save('Museum_Report.pdf');
        }
    </script>
</body>
</html>
