<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการเยี่ยมชม รร.ตท.สทป.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f0ff; }
        .bg-lavender { background-color: #e9d5ff; }
        .btn-purple { background-color: #9333ea; transition: 0.3s; }
        .btn-purple:hover { background-color: #7e22ce; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-purple-200">
        <div class="bg-purple-700 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">บันทึกการเยี่ยมชมพิพิธภัณฑ์ รร.ตท.สทป.</h1>
            <p class="text-sm opacity-80">ระบบบันทึกข้อมูลลง Google Sheets</p>
        </div>

        <div class="p-6">
            <form id="museumForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-2 md:col-span-1">
                    <label class="text-purple-800 font-bold">ชื่อคณะเยี่ยมชม</label>
                    <input type="text" id="groupName" name="groupName" required class="w-full border-2 border-purple-100 rounded-lg p-2 mt-1 focus:border-purple-500 outline-none">
                </div>
                <div>
                    <label class="text-purple-800 font-bold">จำนวนผู้เยี่ยมชม (คน)</label>
                    <input type="number" id="visitorCount" name="visitorCount" required class="w-full border-2 border-purple-100 rounded-lg p-2 mt-1 focus:border-purple-500 outline-none">
                </div>
                <div>
                    <label class="text-purple-800 font-bold">วันที่และเวลา</label>
                    <input type="datetime-local" id="visitDateTime" name="visitDateTime" required class="w-full border-2 border-purple-100 rounded-lg p-2 mt-1 focus:border-purple-500 outline-none">
                </div>
                <div>
                    <label class="text-purple-800 font-bold">ชุดการต้อนรับ</label>
                    <select id="packageType" name="packageType" class="w-full border-2 border-purple-100 rounded-lg p-2 mt-1 focus:border-purple-500 outline-none">
                        <option>ชุดที่ 1: บรรยายสรุป/ภาพรวม</option>
                        <option>ชุดที่ 2: บรรยายพิเศษ/วีดิทัศน์</option>
                        <option>ชุดที่ 3: นำชมเจาะลึก/Workshop</option>
                    </select>
                </div>
                <div class="col-span-2 text-center mt-4">
                    <button type="submit" id="submitBtn" class="btn-purple text-white px-8 py-3 rounded-full font-bold shadow-lg">
                        บันทึกข้อมูลลง Sheet
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-lavender p-4 flex flex-wrap justify-between items-center border-t border-purple-200">
            <h2 class="font-bold text-purple-900">หน้ารายงานข้อมูล</h2>
            <div class="flex gap-2">
                <input type="date" id="filterDate" class="rounded-md border-purple-300 p-1 text-sm">
                <button onclick="fetchData()" class="bg-white text-purple-700 px-3 py-1 rounded shadow text-sm font-bold">รีเฟรชข้อมูล</button>
                <button onclick="exportPDF()" class="bg-red-500 text-white px-3 py-1 rounded shadow text-sm font-bold">พิมพ์ PDF</button>
            </div>
        </div>

        <div class="p-4 overflow-x-auto">
            <table class="w-full text-left" id="reportTable">
                <thead>
                    <tr class="text-purple-700 border-b-2 border-purple-200">
                        <th class="p-2">วันที่เยี่ยมชม</th>
                        <th class="p-2">ชื่อคณะ</th>
                        <th class="p-2 text-center">จำนวน</th>
                        <th class="p-2">ชุดการต้อนรับ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm">
                    <tr><td colspan="4" class="text-center p-4">กำลังโหลดข้อมูลจาก Google Sheets...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfOkJt3nCDpBR128Icd1ZI7vvAgnaKJfY24Nj-FhcM1jv3pP2d1zm9nUFtWB2xT_qq/exec'; // *** ใส่ URL จาก Apps Script ที่นี่ ***

        // บันทึกข้อมูล
        document.getElementById('museumForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'กำลังบันทึก...';
            btn.disabled = true;

            const formData = {
                groupName: document.getElementById('groupName').value,
                visitorCount: document.getElementById('visitorCount').value,
                visitDateTime: document.getElementById('visitDateTime').value,
                packageType: document.getElementById('packageType').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(formData)
            })
            .then(res => {
                alert('บันทึกข้อมูลสำเร็จ!');
                btn.innerText = 'บันทึกข้อมูลลง Sheet';
                btn.disabled = false;
                document.getElementById('museumForm').reset();
                fetchData();
            })
            .catch(err => alert('เกิดข้อผิดพลาด: ' + err));
        });

        // ดึงข้อมูลมาแสดงในตาราง
        function fetchData() {
            fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '';
                // ข้ามหัวตาราง (แถวแรกของ Sheet)
                data.slice(1).forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-purple-50 hover:bg-purple-50";
                    tr.innerHTML = `
                        <td class="p-2">${row[3]}</td>
                        <td class="p-2 font-bold">${row[1]}</td>
                        <td class="p-2 text-center">${row[2]}</td>
                        <td class="p-2">${row[4]}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            });
        }

        // พิมพ์ PDF
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Museum Visit Report - AFAPS", 14, 15);
            doc.autoTable({ html: '#reportTable', startY: 20 });
            doc.save('Report.pdf');
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        fetchData();
    </script>
</body>
</html>
